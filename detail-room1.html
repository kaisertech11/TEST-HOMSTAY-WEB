<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOFT SUITE | THE STAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        .container { display: flex; flex-wrap: wrap; height: 100vh; }
        .image-side { flex: 1.2; background: #eee; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .image-side img { width: 100%; display: block; scroll-snap-align: start; }
        .content-side { flex: 0.8; padding: 60px 5%; overflow-y: auto; background: white; }
        
        .breadcrumb { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-bottom: 20px; }
        .price-tag { font-size: 28px; font-weight: 300; margin: 30px 0; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .specs { margin-bottom: 40px; }
        .specs-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        
        .book-box { background: #f9f9f9; padding: 30px; margin-top: 40px; border-radius: 4px; }
        input[type="date"] { width: 100%; padding: 15px; border: 1px solid #ddd; margin-bottom: 20px; font-size: 16px; }
        .btn-whatsapp { display: block; width: 100%; background: #000; color: #fff; text-align: center; padding: 20px; text-decoration: none; font-weight: 700; letter-spacing: 2px; }
        
        @media (max-width: 800px) { .container { flex-direction: column; } .image-side { height: 50vh; flex: none; } .content-side { flex: none; width: 100%; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="image-side">
            <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=1000&q=80">
            <img src="https://images.unsplash.com/photo-1560448204-603b3fc33ddc?auto=format&fit=crop&w=1000&q=80">
            <img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?auto=format&fit=crop&w=1000&q=80">
        </div>

        <div class="content-side">
            <div class="breadcrumb">Homestay / Selangor / Unit 01</div>
            <h1 style="font-size: 42px; font-weight: 700; letter-spacing: -1px;">THE LOFT SUITE</h1>
            <p class="price-tag">RM 250 <span style="font-size: 14px; color: #888;">/ per night</span></p>

            <div class="specs">
                <div class="specs-row"><span>Area</span> <span>Bangi, Selangor</span></div>
                <div class="specs-row"><span>Size</span> <span>1,200 sqft (3 Bedrooms)</span></div>
                <div class="specs-row"><span>Nearby</span> <span>Evo Mall, IOI City Mall, UKM</span></div>
            </div>

            <div class="book-box">
                <p style="font-size: 12px; font-weight: 700; margin-bottom: 10px; text-transform: uppercase;">Check Availability</p>
                <input type="date" id="bookDate">
                <a href="#" onclick="sendWA()" class="btn-whatsapp">BOOK NOW</a>
            </div>
            
            <p style="margin-top: 30px; font-size: 14px; color: #666; line-height: 1.8;">
                Minimalist living in the heart of Bangi. Fully air-conditioned, high-speed WiFi, and 2 private parkings.
            </p>
        </div>
    </div>

    <script>
        function sendWA() {
            const date = document.getElementById('bookDate').value;
            if(!date) { alert('Sila pilih tarikh dulu bos!'); return; }
            
            const phone = "60136841826";
            const message = `Salam THE STAY, saya berminat nak tempah THE LOFT SUITE untuk tarikh ${date}. Ada kosong lagi tak?`;
            const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
