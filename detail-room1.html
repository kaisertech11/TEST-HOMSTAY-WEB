<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unit Detail | THE STAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #fff; overflow-x: hidden; }
        .container { display: flex; flex-direction: row; height: 100vh; }
        .image-side { flex: 1.2; height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory; }
        .image-side img { width: 100%; display: block; scroll-snap-align: start; margin-bottom: 2px; }
        .content-side { flex: 0.8; padding: 60px 5%; overflow-y: auto; }
        .unit-title { font-size: 40px; font-weight: 800; }
        .price-tag { font-size: 24px; margin: 20px 0; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .booking-card { background: #000; color: #fff; padding: 30px; margin-top: 40px; }
        input[type="date"] { width: 100%; padding: 15px; border: none; margin-bottom: 20px; background: #222; color: #fff; }
        .btn-book { display: block; width: 100%; background: #fff; color: #000; text-align: center; padding: 18px; text-decoration: none; font-weight: 800; }
        @media (max-width: 850px) { .container { flex-direction: column; height: auto; } .image-side { height: 50vh; width: 100%; } .content-side { width: 100%; padding: 40px 8%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-side">
            <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=1000">
            <img src="https://images.unsplash.com/photo-1560448204-603b3fc33ddc?w=1000">
            <img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=1000">
            <img src="https://images.unsplash.com/photo-1484154218962-a197022b5858?w=1000">
            <img src="https://images.unsplash.com/photo-1493809842364-78817add7ffb?w=1000">
        </div>
        <div class="content-side">
            <a href="order.html" style="text-decoration:none; color:black; font-weight:700;">← BACK</a>
            <h1 class="unit-title">TUKAR NAMA UNIT DISINI</h1>
            <p class="price-tag">RM TUKAR HARGA DISINI</p>
            <div class="booking-card">
                <label style="font-size:10px; font-weight:800; display:block; margin-bottom:10px;">PILIH TARIKH</label>
                <input type="date" id="bookDate">
                <a href="#" onclick="confirmBooking()" class="btn-book">BOOK VIA WHATSAPP</a>
            </div>
        </div>
    </div>
    <script>
        function confirmBooking() {
            const date = document.getElementById('bookDate').value;
            if(!date) { alert('Sila pilih tarikh bos!'); return; }
            // TUKAR NAMA UNIT DALAM TEXT WHATSAPP KAT BAWAH NI
            window.open(`https://wa.me/60136841826?text=Saya%20nak%20booking%20unit%20ini%20pada%20tarikh%20${date}.`, '_blank');
        }
    </script>
</body>
</html>
