<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE STAY | Exclusive Living</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand: #000000; --light: #ffffff; --grey: #f5f5f5; --text-muted: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        /* Set body supaya skrin penuh */
        body, html { height: 100%; width: 100%; background: var(--light); color: var(--brand); overflow-x: hidden; display: flex; flex-direction: column; }

        /* --- Navigation Transparent --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 5%;
            position: fixed; /* Navigasi terapung atas gambar */
            top: 0;
            width: 100%;
            background: transparent; /* Telus */
            z-index: 1000;
            /* Kita tambah bayang sikit untuk pastikan tulisan nav nampak */
            /* text-shadow: 0 1px 5px rgba(0,0,0,0.5); */
        }
        .logo { 
            font-weight: 800; 
            font-size: 18px; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            border: 2px solid var(--brand); /* Bingkai hitam untuk branded look */
            background: white; /* Letak bg putih sikit untuk logo nampak */
            padding: 5px 15px; 
            text-decoration: none;
            color: black;
        }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-right a { color: var(--brand); font-size: 16px; transition: 0.3s; text-decoration: none; }
        .nav-right a:hover { opacity: 0.5; }
        
        /* Ikon Navigasi (Kalau tak nampak atas gambar, boleh tukar warna kat sini) */
        .nav-right a .fab, .nav-right a .fas { color: black; }

        /* --- Auto-Slider FULL SCREEN --- */
        .slider-container {
            width: 100%;
            height: 100vh; /* 100% daripada tinggi skrin penuh */
            position: relative;
            overflow: hidden;
            background: var(--grey);
        }

        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1.8s ease-in-out; /* Fade lembut sikit lagi */
            z-index: 1;
        }

        .slide.active {
            opacity: 1;
            z-index: 2;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Pastikan gambar tak herot */
        }

        /* Kita buang Hero Content Teks yang kat tengah-tengah tu */
        /* .hero-content { ... } -> Dah dibuang */

        /* --- Footer Section --- */
        footer {
            margin-top: auto; /* Pastikan footer sentiasa kat bawah bila skrol */
            background: var(--brand);
            color: var(--light);
            padding: 50px 5%;
            font-size: 13px;
            z-index: 10; /* Biar dia muncul atas gambar kalau ada glitch */
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-logo-area { flex: 1; min-width: 250px; }
        .footer-logo { font-weight: 800; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; color: white; margin-bottom: 10px; }
        .footer-tagline { color: #ccc; font-weight: 300; }

        .footer-contact { flex: 1; min-width: 200px; text-align: right; }
        .footer-social-icons { margin-top: 15px; }
        .footer-social-icons a { color: white; font-size: 18px; margin-left: 20px; text-decoration: none; transition: 0.3s; }
        .footer-social-icons a:hover { color: #ccc; }

        /* Mobile Friendly */
        @media (max-width: 768px) {
            .slider-container { height: 80vh; /* Pada mobile kita kurangkan sikit full screen */ }
            .footer-content { flex-direction: column; text-align: center; }
            .footer-contact { text-align: center; }
            .footer-social-icons a { margin: 0 10px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">THE STAY</a>
        <div class="nav-right">
            <a href="https://www.tiktok.com/@._ipan9?_r=1&_t=ZS-958aZFwkqHJ" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.instagram.com/zeeeq._?igsh=MW9pZ3B1ejlxajV0bA==" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="order.html" style="font-size: 13px; font-weight: 800; text-transform: uppercase; color: black; border-bottom: 2px solid #000;">ORDER</a>
        </div>
    </nav>

    <div class="slider-container">
        <div class="slide active">
            <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=2000&q=80">
        </div>
        <div class="slide">
            <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=2000&q=80">
        </div>
        <div class="slide">
            <img src="https://images.unsplash.com/photo-1598928506311-c55ded91a20c?auto=format&fit=crop&w=2000&q=80">
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-logo-area">
                <div class="footer-logo">THE STAY EXCLUSIVE</div>
                <p class="footer-tagline">"Ketenangan alam dalam keselesaan moden."</p>
            </div>
            
            <div class="footer-contact">
                <p>CONTACT US:</p>
                <p style="font-weight: 700; margin-top: 5px;">+60 13-684 1826</p>
                
                <div class="footer-social-icons">
                    <a href="https://www.tiktok.com/@._ipan9?_r=1&_t=ZS-958aZFwkqHJ" target="_blank"><i class="fab fa-tiktok"></i></a>
                    <a href="https://www.instagram.com/zeeeq._?igsh=MW9pZ3B1ejlxajV0bA==" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://wa.me/60136841826?text=Salam%20THE%20STAY%2C%20saya%20ada%20pertanyaan%20mengenai%20homestay." target="_blank"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </div>
        
        <p style="font-size: 10px; color: #aaa; text-align: center; margin-top: 40px; letter-spacing: 2px;">
            &copy; 2026 THE STAY EXCLUSIVE. ALL RIGHTS RESERVED.
        </p>
    </footer>

    <script>
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        const slideInterval = 5000; // Tukar kepada 5 saat untuk feel relax sikit

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        setInterval(nextSlide, slideInterval);
    </script>

</body>
</html>
