<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE STAY | Exclusive Homestay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand: #1a1a1a; --grey: #f8f8f8; --accent: #27ae60; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        /* Header Ala Uniqlo */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 1000; }
        .logo { font-weight: 800; font-size: 24px; letter-spacing: 2px; text-transform: uppercase; }
        .nav-right a { margin-left: 20px; text-decoration: none; color: var(--brand); font-size: 14px; font-weight: 600; border: 1px solid var(--brand); padding: 8px 16px; transition: 0.3s; }
        .nav-right a:hover { background: var(--brand); color: white; }

        /* Hero Video/Image */
        .hero-video { width: 100%; height: 70vh; background: var(--grey); position: relative; overflow: hidden; }
        .hero-video video, .hero-video img { width: 100%; height: 100%; object-fit: cover; }
        .hero-text { position: absolute; bottom: 50px; left: 5%; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        /* Grid Homestay (Iklan) */
        .section-title { padding: 50px 5% 20px; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .house-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 0 5% 50px; }
        .house-card { cursor: pointer; text-decoration: none; color: var(--brand); }
        .house-card img { width: 100%; height: 400px; object-fit: cover; transition: 0.5s; }
        .house-card:hover img { opacity: 0.8; }
        .house-info { margin-top: 15px; display: flex; justify-content: space-between; }
        .status-tag { font-size: 12px; padding: 2px 8px; border: 1px solid #ccc; }
        .status-available { color: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">THE STAY.</div>
        <div class="nav-right">
            <a href="https://tiktok.com/@id_anda" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://instagram.com/id_anda" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="order.html">LIHAT SEMUA UNIT</a>
        </div>
    </nav>

    <div class="hero-video">
        <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1500&q=80" alt="Hero Image">
        <div class="hero-text">
            <h1>MODERN LIVING.</h1>
            <p>Pengalaman menginap yang eksklusif dan tenang.</p>
        </div>
    </div>

    <h2 class="section-title">Koleksi Homestay Kami</h2>
    <div class="house-grid">
        <a href="detail-room1.html" class="house-card">
            <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=600&q=80">
            <div class="house-info">
                <div>
                    <h4>THE LOFT SUITE</h4>
                    <p style="font-size: 13px; color: #666;">Bangi, Selangor</p>
                </div>
                <div class="status-tag status-available">AVAILABLE</div>
            </div>
        </a>

        <a href="detail-room2.html" class="house-card">
            <img src="https://images.unsplash.com/photo-1556911223-e45243376f67?auto=format&fit=crop&w=600&q=80">
            <div class="house-info">
                <div>
                    <h4>GARDEN VILLA</h4>
                    <p style="font-size: 13px; color: #666;">Kajang, Selangor</p>
                </div>
                <div class="status-tag" style="color:red; border-color:red;">BOOKED</div>
            </div>
        </a>
    </div>

</body>
</html>
