<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE STAY | Exclusive Living</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand: #000000; --light: #ffffff; --grey: #f5f5f5; --text-muted: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--light); color: var(--brand); overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }

        /* Navigation Style Uniqlo (Sama) */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid #eee; position: sticky; top: 0; background: rgba(255,255,255,0.95); z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; border: 2px solid var(--brand); padding: 5px 15px; }
        .nav-right a { margin-left: 15px; color: var(--brand); font-size: 16px; transition: 0.3s; text-decoration: none; }
        .nav-right a:hover { opacity: 0.5; }

        /* --- Auto-Slider Section --- */
        .slider-container {
            width: 100%;
            height: 60vh; /* Kita kecikkan sikit tinggi dia supaya tak 'makan' satu skrin */
            position: relative;
            overflow: hidden;
            background: var(--grey);
        }

        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0; /* Mula-mula tak nampak */
            transition: opacity 1.5s ease-in-out; /* Kesan fade lembut */
            z-index: 1;
        }

        /* Slide yang aktif akan nampak */
        .slide.active {
            opacity: 1;
            z-index: 2;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Pastikan gambar tak herot */
        }

        /* Hero Text atas Slider */
        .hero-content {
            position: absolute;
            bottom: 40px;
            left: 5%;
            z-index: 10;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .hero-content h1 { font-size: clamp(30px, 5vw, 60px); font-weight: 800; letter-spacing: -1px; line-height: 1; margin-bottom: 10px; }
        .btn-main { display: inline-block; padding: 12px 30px; background: var(--light); color: black; text-decoration: none; font-weight: 600; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-main:hover { background: #eee; transform: translateY(-2px); }

        /* --- Footer Section --- */
        footer {
            margin-top: auto; /* Pastikan footer sentiasa kat bawah skrin */
            background: var(--brand);
            color: var(--light);
            padding: 50px 5%;
            font-size: 13px;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-logo-area { flex: 1; min-width: 250px; }
        .footer-logo { font-weight: 800; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; color: white; margin-bottom: 10px; }
        .footer-tagline { color: #ccc; font-weight: 300; }

        .footer-contact { flex: 1; min-width: 200px; text-align: right; }
        .footer-social-icons { margin-top: 15px; }
        .footer-social-icons a { color: white; font-size: 18px; margin-left: 20px; text-decoration: none; transition: 0.3s; }
        .footer-social-icons a:hover { color: #ccc; }

        /* Mobile Friendly for Slider & Footer */
        @media (max-width: 768px) {
            .slider-container { height: 40vh; }
            .hero-content { bottom: 20px; }
            .footer-content { flex-direction: column; text-align: center; }
            .footer-contact { text-align: center; }
            .footer-social-icons a { margin: 0 10px; }
        }
    </style>
</head>
<body>

    <nav>

        <div class="nav-right">

            <a href="order.html" style="font-size: 13px; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid #000;">ORDER</a>

    </nav>

    <div class="slider-container">

            <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1500&q=80">

        <div class="hero-content">
            <h1>ESSENTIAL<br>COMFORT.</h1>
            <p style="font-weight: 300; max-width: 400px; color: #ddd;">Nikmati penginap eksklusif ala butik mewah di lokasi strategik.</p>
            <a href="order.html" class="btn-main">Explore Units</a>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-logo-area">
                <div class="footer-logo">THE STAY EXCLUSIVE</div>
                <p class="footer-tagline">"Ketenangan alam dalam keselesaan moden."</p>

            <div class="footer-contact">

                <p style="font-weight: 700; margin-top: 5px;">+60 13-684 1826</p>

        </p>
    </footer>

    <script>
        // Ambil semua element slide
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        const slideInterval = 4000; // Masa tukar slide (dalam milisaat - 4 saat)

        function nextSlide() {
            // Hilangkan class active dari slide sekarang
            slides[currentSlide].classList.remove('active');
            // Kira index slide seterusnya
            currentSlide = (currentSlide + 1) % slides.length;
            // Tambah class active pada slide seterusnya
            slides[currentSlide].classList.add('active');
        }

        // Jalankan fungsi nextSlide secara automatik setiap masa interval
        setInterval(nextSlide, slideInterval);
    </script>

</body>
</html>
