<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE STAY | Exclusive Living</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand: #000000; --light: #ffffff; --grey: #f5f5f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--light); color: var(--brand); overflow-x: hidden; }

        /* --- Header (Footer Atas) --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: white;
            border-bottom: 1px solid #eee;
        }
        .logo { 
            font-weight: 800; 
            font-size: 18px; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            border: 2px solid black;
            padding: 5px 12px;
            text-decoration: none;
            color: black;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .nav-right a {
            text-decoration: none;
            color: black;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .nav-right a:hover { opacity: 0.6; }
        .nav-right i { font-size: 18px; }

        /* --- Slider Section (Hampir Full Screen) --- */
        .slider-container {
            width: 100%;
            height: 85vh; /* 85% skrin supaya nampak sikit footer bawah bila skrol */
            position: relative;
            overflow: hidden;
            background: #000;
        }
        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .slide.active { opacity: 1; z-index: 2; }
        .slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); }

        /* Teks Tengah Atas Gambar */
        .hero-content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            color: white;
            width: 90%;
        }
        .hero-content h1 { 
            font-size: clamp(40px, 8vw, 80px); 
            font-weight: 800; 
            letter-spacing: -2px; 
            line-height: 0.9; 
            margin-bottom: 20px;
        }
        .btn-main { 
            display: inline-block; 
            padding: 15px 35px; 
            background: white; 
            color: black; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 12px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            border-radius: 50px;
            transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.05); background: #eee; }

        /* --- Footer Bawah (Contact & Kata-kata) --- */
        footer {
            background: black;
            color: white;
            padding: 60px 5%;
            text-align: center;
        }
        .footer-grid {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto 40px;
        }
        .footer-left { text-align: left; flex: 1; min-width: 280px; }
        .footer-right { text-align: right; flex: 1; min-width: 200px; }
        
        .footer-left h2 { font-weight: 800; letter-spacing: 2px; margin-bottom: 10px; }
        .footer-left p { color: #888; font-style: italic; font-size: 14px; }
        
        .footer-right p { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .footer-right h3 { font-size: 20px; margin-top: 5px; }
        
        .footer-socials { margin-top: 20px; display: flex; justify-content: flex-end; gap: 20px; }
        .footer-socials a { color: white; font-size: 20px; transition: 0.3s; }
        .footer-socials a:hover { opacity: 0.6; }

        @media (max-width: 768px) {
            .footer-left, .footer-right { text-align: center; }
            .footer-socials { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">THE STAY</a>
        <div class="nav-right">
            <a href="order.html">ORDER</a>
            <a href="https://www.instagram.com/zeeeq._?igsh=MW9pZ3B1ejlxajV0bA==" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@._ipan9?_r=1&_t=ZS-958aZFwkqHJ" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>
    </header>

    <div class="slider-container">
        <div class="slide active">
            <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=2000&q=80">
        </div>
        <div class="slide">
            <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=2000&q=80">
        </div>
        
        <div class="hero-content">
            <h1>ESSENTIAL<br>COMFORT.</h1>
            <a href="order.html" class="btn-main">EXPLORE UNITS</a>
        </div>
    </div>

    <footer>
        <div class="footer-grid">
            <div class="footer-left">
                <h2>THE STAY EXCLUSIVE</h2>
                <p>"Ketenangan alam dalam keselesaan moden."</p>
            </div>
            
            <div class="footer-right">
                <p>Contact Us</p>
                <h3>+60 13-684 1826</h3>
                <div class="footer-socials">
                    <a href="https://www.instagram.com/zeeeq._?igsh=MW9pZ3B1ejlxajV0bA==" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@._ipan9?_r=1&_t=ZS-958aZFwkqHJ" target="_blank"><i class="fab fa-tiktok"></i></a>
                    <a href="https://wa.me/60136841826" target="_blank"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </div>
        <p style="font-size: 10px; color: #444; letter-spacing: 2px;">© 2026 THE STAY EXCLUSIVE. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 5000);
    </script>
</body>
</html>
