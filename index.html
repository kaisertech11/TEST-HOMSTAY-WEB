<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE STAY | Exclusive Living</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand: #000000; --accent: #27ae60; --light: #ffffff; --grey: #f5f5f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--light); color: var(--brand); overflow-x: hidden; }

        /* Navigation Style Uniqlo */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; border-bottom: 1px solid #eee; position: sticky; top: 0; background: rgba(255,255,255,0.95); z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-weight: 800; font-size: 22px; letter-spacing: 4px; text-transform: uppercase; border: 2px solid var(--brand); padding: 5px 15px; }
        .nav-socials a { margin-left: 20px; color: var(--brand); font-size: 18px; transition: 0.3s; text-decoration: none; }
        .nav-socials a:hover { opacity: 0.5; }

        /* Hero Section */
        .hero { height: 85vh; width: 100%; position: relative; background: var(--grey); overflow: hidden; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); }
        .hero-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 90%; }
        .hero-content h1 { font-size: clamp(40px, 8vw, 90px); font-weight: 800; letter-spacing: -2px; line-height: 0.9; margin-bottom: 20px; }
        .btn-main { display: inline-block; padding: 15px 40px; background: var(--brand); color: white; text-decoration: none; font-weight: 600; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .btn-main:hover { background: #333; transform: scale(1.05); }

        /* Featured Section */
        .section-label { padding: 60px 5% 20px; font-size: 12px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: #888; }
        .featured-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 10px; padding: 0 5% 100px; }
        .unit-card { text-decoration: none; color: inherit; transition: 0.4s; }
        .unit-card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; }
        .unit-info { padding: 15px 0; border-top: 1px solid #eee; margin-top: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">THE STAY</div>
        <div class="nav-socials">
            <a href="https://www.tiktok.com/@._ipan9?_r=1&_t=ZS-958aZFwkqHJ" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.instagram.com/zeeeq._?igsh=MW9pZ3B1ejlxajV0bA==" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="order.html" style="font-size: 14px; font-weight: 800; border-bottom: 2px solid #000; margin-left: 30px;">ORDER</a>
        </div>
    </nav>

    <div class="hero">
        <img class="hero-img" src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1500&q=80">
        <div class="hero-content">
            <h1>ESSENTIAL<br>COMFORT.</h1>
            <a href="order.html" class="btn-main">View Collection</a>
        </div>
    </div>

    <div class="section-label">Selected Units</div>
    <div class="featured-grid">
        <a href="detail-room1.html" class="unit-card">
            <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=800&q=80">
            <div class="unit-info">
                <div>
                    <p style="font-weight: 700;">THE LOFT SUITE</p>
                    <p style="font-size: 12px; color: #777;">BANGI, SELANGOR</p>
                </div>
                <p style="font-weight: 700;">RM 250</p>
            </div>
        </a>
    </div>

</body>
</html>
