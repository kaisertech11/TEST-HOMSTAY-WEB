<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE STAY | Exclusive Living</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand: #000000; --light: #ffffff; --grey: #f5f5f5; --text-muted: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        /* Set body supaya skrin penuh */
        body, html { height: 100%; width: 100%; background: var(--light); color: var(--brand); overflow-x: hidden; display: flex; flex-direction: column; }

        /* --- Navigation Transparent --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 5%;
            position: fixed; /* Navigasi terapung atas gambar */
            top: 0;
            width: 100%;
            background: transparent; /* Telus */
            z-index: 1000;
        }
        .logo { 
            font-weight: 800; 
            font-size: 18px; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            border: 2px solid var(--brand); /* Bingkai hitam untuk branded look */
            background: white; /* Letak bg putih sikit untuk logo nampak jelas */
            padding: 5px 15px; 
            text-decoration: none;
            color: black;
        }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        /* Tukar warna ikon/teks nav jadi hitam untuk branded vibe */
        .nav-right a { color: black; font-size: 16px; transition: 0.3s; text-decoration: none; font-weight: 600; }
        .nav-right a:hover { opacity: 0.5; }
        .nav-right a i { color: black; }

        /* --- Auto-Slider FULL SCREEN --- */
        .slider-container {
            width: 100%;
            height: 100vh; /* 100% tinggi skrin penuh */
            position: relative;
            overflow: hidden;
            background: var(--grey);
        }

        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1.8s ease-in-out; /* Fade lembut */
            z-index: 1;
        }

        .slide.active {
            opacity: 1;
            z-index: 2;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Pastikan gambar tak herot */
        }

        /* Lapisan gelap sikit kat atas gambar supaya tulisan nampak */
        .slide::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1); /* Tipis gila, just enough untuk tulisan */
        }

        /* --- Hero Content Teks Tengah (Dikekalkan) --- */
        .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Sentiasa kat tengah skrin */
            z-index: 10;
            text-align: center;
            color: white; /* Tulisan putih */
            text-shadow: 0 3px 15px rgba(0,0,0,0.4); /* Bayang tebal sikit untuk nampak jelas */
            width: 90%;
            max-width: 700px;
        }
        .hero-content h1 { 
            font-size: clamp(40px, 8vw, 85px); /* Besar gila macam Uniqlo */
            font-weight: 800; 
            letter-spacing: -3px; 
            line-height: 0.9; 
            margin-bottom: 20px; 
            text-transform: uppercase;
        }
        .hero-content p {
            font-weight: 300;
            font-size: 16px;
            color: #eee;
            margin-bottom: 30px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .btn-main { 
            display: inline-block; 
            padding: 15px 40px; 
            background: var(--brand); /* Butang hitam */
            color: white; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 14px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            transition: 0.3s; 
            border-radius: 40px; /* Bucu bulat sikit */
        }
        .btn-main:hover { 
            background: #333; 
            transform: translateY(-3px) scale(1.03); 
        }

        /* --- Footer Section --- */
        footer {
            margin-top: auto; /* Pastikan footer sentiasa kat bawah skrin bila skrol */
            background: var(--brand);
            color: var(--light);
            padding: 50px 5%;
            font-size: 13px;
            z-index: 10;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-logo-area { flex: 1; min-width: 250px; }
        .footer-logo { font-weight: 800; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; color: white; margin-bottom: 10px; }
        .footer-tagline { color: #ccc; font-weight: 300; }

        .footer-contact { flex: 1; min-width: 200px; text-align: right; }
        .footer-social-icons { margin-top: 15px; }
        .footer-social-icons a { color: white; font-size: 18px; margin-left: 20px; text-decoration: none; transition: 0.3s; }
        .footer-social-icons a:hover { color: #ccc; }

        /* Mobile Friendly */
        @media (max-width: 768px) {
            .hero-content h1 { font-size: 40px; letter-spacing: -1px; }
            .hero-content p { font-size: 14px; }
            .btn-main { padding: 12px 30px; font-size: 12px; }
            .footer-content { flex-direction: column; text-align: center; }
            .footer-contact { text-align: center; }
            .footer-social-icons a { margin: 0 10px; }
        }
    </style>
</head>

    <script>
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        const slideInterval = 5000; // Tukar kepada 5 saat untuk feel relax sikit

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        setInterval(nextSlide, slideInterval);
    </script>
