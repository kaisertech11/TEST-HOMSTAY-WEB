<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GARDEN VILLA | THE STAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #fff; overflow-x: hidden; }
        .container { display: flex; flex-direction: row; height: 100vh; }
        .image-side { flex: 1.2; height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory; background: #f5f5f5; }
        .image-side img { width: 100%; display: block; scroll-snap-align: start; margin-bottom: 2px; }
        .content-side { flex: 0.8; padding: 60px 5%; overflow-y: auto; }
        .nav-back { margin-bottom: 30px; }
        .nav-back a { text-decoration: none; color: #000; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .unit-title { font-size: 40px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
        .price-tag { font-size: 24px; margin: 20px 0; font-weight: 300; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .specs-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        .specs-row span:first-child { color: #888; text-transform: uppercase; font-size: 11px; font-weight: 700; }
        .booking-card { background: #000; color: #fff; padding: 30px; margin-top: 40px; }
        label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }
        input[type="date"] { width: 100%; padding: 15px; border: none; margin-bottom: 20px; font-size: 16px; background: #222; color: #fff; }
        .btn-book { display: block; width: 100%; background: #fff; color: #000; text-align: center; padding: 18px; text-decoration: none; font-weight: 800; letter-spacing: 1px; }

        @media (max-width: 850px) {
            .container { flex-direction: column; height: auto; }
            .image-side { height: 50vh; flex: none; width: 100%; }
            .content-side { flex: none; width: 100%; padding: 40px 8%; }
            .unit-title { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-side">
            <img src="https://images.unsplash.com/photo-1556911223-e45243376f67?auto=format&fit=crop&w=1000&q=80">
            <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1000&q=80">
            <img src="https://images.unsplash.com/photo-1582268611958-ebfd161ef9cf?auto=format&fit=crop&w=1000&q=80">
            <img src="https://images.unsplash.com/photo-1599809275671-b5942cabc7a2?auto=format&fit=crop&w=1000&q=80">
            <img src="https://images.unsplash.com/photo-1560185007-cde436f6a4d0?auto=format&fit=crop&w=1000&q=80">
        </div>
        <div class="content-side">
            <div class="nav-back"><a href="order.html">← BACK</a></div>
            <h1 class="unit-title">GARDEN VILLA</h1>
            <p class="price-tag">RM 400 <span style="font-size: 14px; color: #888;">/ night</span></p>
            <div class="specs">
                <div class="specs-row"><span>Location</span> <span>Kajang, Selangor</span></div>
                <div class="specs-row"><span>Type</span> <span>4 Bedrooms / 3 Baths</span></div>
                <div class="specs-row"><span>Feature</span> <span>Private Garden & BBQ</span></div>
            </div>
            <div class="booking-card">
                <label>Pilih Tarikh</label>
                <input type="date" id="bookDate2">
                <a href="#" onclick="confirmBooking()" class="btn-book">BOOK VIA WHATSAPP</a>
            </div>
        </div>
    </div>
    <script>
        function confirmBooking() {
            const date = document.getElementById('bookDate2').value;
            if(!date) { alert('Sila pilih tarikh bos!'); return; }
            window.open(`https://wa.me/60136841826?text=Salam%20THE%20STAY,%20saya%20nak%20booking%20GARDEN%20VILLA%20untuk%20tarikh%20${date}.`, '_blank');
        }
    </script>
</body>
</html>
